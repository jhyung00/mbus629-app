    @font-face {

    }

    html {
        overflow: visible;
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        line-height: 1em;
        background: #fff;
    }

    body, html {
        background: #fff;
        height: 100%;
        margin: 0;
        overflow-x: hidden;
        font-smooth: always;
        -webkit-font-smoothing: antialiased;
        -moz-font-smoothing: antialiased;
    }

    body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-family: ESPeak, Arial, sans-serif;
        font-size: 1.25em;
        font-weight: 400;
        line-height: 28px;
        min-width: 320px;
        overflow-y: scroll !important;
        -webkit-overflow-scrolling: touch;
        color: #00004f;
        display: block;
        transition: background-color 1s ease;
    }

    *, :after, :before {
        box-sizing: inherit;
    }

    /* Dynamic Animated Background */
    .bg-layer {
      position: fixed;
      inset: -5%;
      z-index: -2;
      background-size: cover;
      background-position: center;
      transition: background-image 1s ease-in-out;
      opacity: 0.15;
      filter: blur(10px);
    }
    
    .gradient-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(-180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.95) 100%);
    }

    /* Crisp corporate panels overriding old dark glass */
    .glass-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 2px solid #00004f;
      box-shadow: 8px 8px 0px rgba(0, 0, 79, 0.1);
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.98);
      border-bottom: 2px solid #00004f;
      box-shadow: 0 4px 20px rgba(0,0,79,0.05);
    }

    /* Window Opening Interactive Hover Effect */
    .btn-window {
        position: relative;
        overflow: hidden;
        background-color: #00004f; /* Navy */
        color: #ffb3d9; /* Pink text */
        border: 2px solid #00004f;
        z-index: 1;
        transition: color 0.4s cubic-bezier(0.86, 0, 0.07, 1), transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-window::before {
        content: '';
        position: absolute;
        top: 0; bottom: 0; left: 0; right: 0;
        background-color: #ffb3d9; /* Pink background reveals */
        transform: scaleX(0); /* Starts closed from center */
        transform-origin: center;
        transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1);
        z-index: -1;
    }

    .btn-window:hover:not(:disabled) {
        color: #00004f; /* Text flips to Navy */
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(255, 179, 217, 0.4);
        transform: translateY(-2px);
    }

    .btn-window:hover:not(:disabled)::before {
        transform: scaleX(1); /* Window background opens out to cover button */
    }

    /* Selected state variations */
    .btn-window.selected-correct {
        background-color: #10b981;
        color: white;
        border-color: #10b981;
    }
    .btn-window.selected-wrong {
        background-color: #f43f5e;
        color: white;
        border-color: #f43f5e;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,79,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,79,0.2); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background-color: rgba(0,0,79,0.4); }
    
    /* Meter Transitions */
    .meter-fill { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.4s ease; }
  </style>

      const currentLevel = levels[state.viewingIndex];

      const historyData = levelData[state.viewingIndex];

      };

      const applyEffectsAndSetState = (baseEffects, wasCorrect, prevState) => {
        let finalEffects = { ...baseEffects };
        let newActive = { ...prevState.active };

        if (prevState.active.insurance && !wasCorrect) {
          ['cash', 'profit'].forEach(k => { if (finalEffects[k] < 0) finalEffects[k] = Math.ceil(finalEffects[k] / 2); });
          newActive.insurance = false;
          addLog('Risk Hedge Active', 'Negative impacts mitigated.');
        }

        if (prevState.active.analyst && wasCorrect) {
          finalEffects.bus = (finalEffects.bus || 0) + 30;
          newActive.analyst = false;
          addLog('Analyst Sprint', 'Bonus synergy points awarded.');
        } else if (prevState.active.analyst && !wasCorrect) {
          newActive.analyst = false;
        }

        const clamp = (n) => Math.max(0, Math.min(100, n));
        setState({
          ...prevState, active: newActive,
          cash: clamp(prevState.cash + (finalEffects.cash || 0)),
          profit: clamp(prevState.profit + (finalEffects.profit || 0)),
          reputation: clamp(prevState.reputation + (finalEffects.rep || 0)),
          operations: clamp(prevState.operations + (finalEffects.ops || 0)),
          accuracy: prevState.accuracy + (finalEffects.acc || 0),
          business: prevState.business + (finalEffects.bus || 0)
        });
        return finalEffects;
      };

      const handleTimeout = (currentState) => {
        const effects = { cash: -5, profit: -5, rep: -10, ops: -10, acc: 0, bus: -20 };
        applyEffectsAndSetState(effects, false, currentState);
        
        const timeoutFeedback = {
          good: false, title: 'Analysis Timeout',
          copy: 'Decision window closed. Operations descended into chaos.',
          explanation: levels[currentState.viewingIndex].explanation,
          effects
        };
        
        setLevelData(prev => ({ ...prev, [currentState.viewingIndex]: { choiceIdx: -1, correct: false, feedback: timeoutFeedback } }));
        addLog(`Phase ${levels[currentState.viewingIndex].id}: Timeout`, `Critical indecision caused operational delays.`);
      };

      // Improved Timer Logic to avoid React State conflicts
      useEffect(() => {
        if (!gameStarted || state.finished || isReviewMode || isCurrentAnswered) return;
        
        if (state.timeLeft <= 0) {
          handleTimeout(state);
          return;
        }

        const timerId = setTimeout(() => {
          setState(prev => ({ ...prev, timeLeft: Math.max(0, prev.timeLeft - 1) }));
        }, 1000);
        
        return () => clearTimeout(timerId);
      }, [gameStarted, state.finished, isReviewMode, isCurrentAnswered, state.timeLeft, state.viewingIndex]);

      const handleChoice = (choiceIdx) => {
        if (isReviewMode || isCurrentAnswered) return;
        const choice = currentLevel.choices[choiceIdx];
        const finalEffects = applyEffectsAndSetState(choice.effects, choice.correct, state);

        const newFeedback = {
          good: choice.correct,
          title: choice.fb,
          explanation: currentLevel.explanation,
          effects: finalEffects
        };

        setLevelData(prev => ({ ...prev, [state.viewingIndex]: { choiceIdx, correct: choice.correct, feedback: newFeedback } }));
        addLog(`Phase ${currentLevel.id} Resolved`, choice.correct ? 'Optimal strategy executed.' : 'Sub-optimal outcome recorded.');
      };

      const nextLevel = () => {
        if (state.viewingIndex < state.currentIndex) {
            setState(prev => ({ ...prev, viewingIndex: prev.viewingIndex + 1 }));
            return;
        }
        if (state.currentIndex + 1 >= levels.length) {
          setState(prev => ({ ...prev, finished: true }));
        } else {
          setState(prev => ({ ...prev, currentIndex: prev.currentIndex + 1, viewingIndex: prev.currentIndex + 1, timeLeft: 120, active: { ...prev.active, usedMemo: false } }));
        }
      };

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      const handleUseMemo = () => {
        if (state.inventory.memo > 0 && !state.active.usedMemo && !answeredState) {
          setState(prev => ({
            ...prev,
            inventory: { ...prev.inventory, memo: prev.inventory.memo - 1 },
            active: { ...prev.active, usedMemo: true }

            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },

                  </div>
                  {state.viewingIndex > 0 && (
                    <button onClick={() => {if(state.viewingIndex > 0) setState(prev => ({ ...prev, viewingIndex: prev.viewingIndex - 1 }))}} className="text-xs font-black flex items-center gap-1 text-navy/60 hover:text-navy transition-colors uppercase tracking-widest bg-white px-4 py-2 rounded-xl border-2 border-navy/20 hover:border-navy shadow-sm">
                      <svg className="w-4 h-4 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                      Previous Phase
                    </button>
                  )}
                </div>
                
                <h2 className="text-4xl md:text-5xl font-bold text-navy mb-4 tracking-wide leading-tight relative z-10">{currentLevel.title}</h2>
                <div className={`font-bold mb-6 flex items-center gap-2 text-sm uppercase tracking-widest relative z-10 text-navy/70`}>
                  <Icons.FileText /> Subject: {currentLevel.concept}
                </div>

                <div className={`w-full h-48 md:h-64 rounded-2xl overflow-hidden relative mb-8 border-2 border-navy shadow-lg group z-10`}>
                  <img src={currentLevel.bgImage} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000 ease-out" alt="Scenario Env" />
                </div>

                <div className="bg-white/90 p-6 rounded-2xl border-2 border-navy/20 text-navy text-lg leading-relaxed shadow-sm backdrop-blur-md relative z-10 font-medium">
                  {currentLevel.scene}
                </div>

                {/* CONSULTANT HINT */}
                <div className="mt-6 relative z-10">
                  {!state.active.usedMemo && !answeredState ? (
                    <div className="bg-navy/5 border-2 border-navy/20 p-5 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-4 backdrop-blur-sm">
                      <div className="flex items-center gap-4">
                        <div className="text-navy/50 bg-white p-3 rounded-xl border border-navy/20"><Icons.Lock /></div>
                        <div>
                          <div className="font-black text-navy text-sm uppercase tracking-wider">Executive Hint Locked</div>
                          <div className="text-navy/60 font-bold text-xs mt-1">Reveal the underlying accounting standard.</div>
                        </div>
                      </div>
                      <button 
                        onClick={handleUseMemo}
                        className={`shrink-0 font-black text-sm uppercase tracking-widest px-6 py-4 rounded-xl transition-all flex items-center gap-2 border-b-4 ${state.inventory.memo > 0 ? `bg-accent-hotpink text-navy border-[#cc0052] hover:bg-opacity-90 hover:translate-y-[-2px] active:translate-y-[2px] active:border-b-0` : 'bg-gray-200 text-gray-500 border-gray-300 cursor-not-allowed'}`}
                      >
                        {state.inventory.memo > 0 ? (
                          <>Unlock Hint <span className="bg-white/30 px-2 py-0.5 rounded font-mono text-xs ml-2 shadow-sm">x{state.inventory.memo}</span></>
                        ) : (
                          <>No Memos Owned</>
                        )}
                      </button>
                    </div>
                  ) : (
                    <div className={`bg-navy/5 border-2 border-navy p-6 rounded-2xl animate-fade-in backdrop-blur-md`}>
                      <div className={`flex items-center gap-2 mb-3 font-black text-sm uppercase tracking-widest text-navy`}>
                        <Icons.Unlock /> Executive Summary Revealed
                      </div>
                      <p className="text-navy text-base leading-relaxed font-bold">{currentLevel.tip}</p>
                    </div>
                  )}
                </div>
              </div>

              {/* EVENT LOG */}
              <div className="glass-panel rounded-3xl p-6 animate-slide-up hidden lg:flex flex-col max-h-[250px] flex-shrink-0 relative overflow-hidden">
                 <div className={`text-xs font-black uppercase tracking-widest mb-4 flex items-center gap-2 text-navy`}>
                   <div className="w-3 h-3 rounded-full bg-navy animate-pulse-fast"></div> System Audit Trail
                 </div>
                 <div className="flex-1 overflow-y-auto space-y-3 pr-2 scroll-smooth font-mono text-sm">
                    {logs.length === 0 ? <div className="text-navy/50 italic font-bold">No actions recorded in current session.</div> : null}
                    {logs.map(log => (
                      <div key={log.id} className={`border-l-4 border-navy pl-4 py-2 animate-fade-in bg-navy/5 rounded-r-xl shadow-sm`}>
                        <span className="text-navy/50 font-black text-[10px] mr-2 block mb-1">{log.time}</span>
                        <strong className="text-navy">{log.title}</strong>
                        <span className="text-navy/80 block text-xs mt-1">{log.text}</span>
                      </div>
                    ))}
                 </div>
              </div>

            </div>

            {/* RIGHT COLUMN: ACTIONS & DECISIONS */}
            <div className="lg:col-span-5 flex flex-col gap-5 overflow-y-auto pr-2 pb-10">
              
              {/* ACTION HEADER & INVENTORY BAR */}
              <div className="flex flex-col gap-3 shrink-0 animate-slide-up">
                <div className="flex justify-between items-center bg-white/95 p-5 rounded-2xl border-2 border-navy shadow-md backdrop-blur-md">
                  <div className="flex items-center gap-3">
                    <div className={`w-4 h-4 rounded-full border-2 border-navy ${answeredState ? 'bg-slate-400' : `bg-accent-hotpink animate-pulse`}`}></div>
                    <span className="text-base font-black uppercase tracking-widest text-navy">
                      {answeredState ? 'Analysis Complete' : 'Awaiting Directive'}
                    </span>
                  </div>
                  
                  {/* Shop Trigger Button */}
                  <button onClick={() => setShowShop(true)} className="group flex items-center gap-3 bg-white border-2 border-navy hover:bg-navy hover:text-white text-navy px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-sm hover:shadow-md hover:-translate-y-1 active:translate-y-0">
                    <span className="flex items-center gap-1 transition-colors"><Icons.ShoppingCart /> Shop</span>
                    <span className="text-navy bg-navy/10 group-hover:bg-white/20 group-hover:text-white font-mono px-2 py-1 rounded-lg border border-navy/20 flex items-center gap-1">
                      {state.business} pts
                    </span>
                  </button>
                </div>

                {/* Mini Active Inventory Bar */}
                <div className="flex gap-2 text-xs font-bold uppercase tracking-wider">
                  {state.active.insurance && (
                    <div className="bg-emerald-500 text-white px-4 py-2 rounded-xl flex items-center gap-2 shadow-sm border-b-2 border-emerald-700 animate-pulse-fast">
                      <Icons.Shield /> Risk Hedge Active
                    </div>
                  )}
                  {state.active.analyst && (
                    <div className="bg-blue-500 text-white px-4 py-2 rounded-xl flex items-center gap-2 shadow-sm border-b-2 border-blue-700 animate-pulse-fast">
                      <Icons.TrendingUp /> Sprint Active
                    </div>
                  )}
                </div>
              </div>

              {/* CHOICES */}
              <div className="flex flex-col gap-4 shrink-0">
                {currentLevel.choices.map((choice, idx) => {
                  const isSelected = historyData?.choiceIdx === idx;
                  
                  let btnClass = "btn-window w-full text-left p-6 font-bold text-[16px] leading-relaxed rounded-2xl outline-none flex gap-4 items-center ";
                  
                  if (!answeredState) {
                    btnClass += "cursor-pointer";
                  } else if (isSelected) {
                    btnClass += choice.correct ? " selected-correct scale-[1.02]" : " selected-wrong scale-[1.02]";
                  } else {
                    btnClass += " opacity-40 grayscale cursor-not-allowed border-navy bg-white text-navy";
                  }

                  return (
                    <button key={idx} disabled={answeredState} onClick={() => handleChoice(idx)} className={btnClass} style={{animationDelay: `${idx * 0.1}s`}}>
                      <div className="flex gap-4 items-center relative z-10 w-full">
                        <div className="flex-shrink-0">
                          {isSelected && choice.correct && <div className="text-white bg-emerald-500 p-1.5 rounded-full shadow-lg border-2 border-white/20"><Icons.Check /></div>}
                          {isSelected && !choice.correct && <div className="text-white bg-rose-500 p-1.5 rounded-full shadow-lg border-2 border-white/20"><Icons.X /></div>}
                          {!isSelected && <div className={`w-7 h-7 rounded-full border-4 border-current transition-colors shadow-inner`}></div>}
                        </div>
                        <span className="transition-colors z-10 relative">
                          {choice.text}
                        </span>
                      </div>
                    </button>
                  );
                })}
              </div>

              {/* FEEDBACK PANEL */}
              {feedback && (
                <div className={`mt-2 p-6 rounded-3xl border-2 backdrop-blur-xl animate-slide-right flex-shrink-0 shadow-xl ${feedback.good ? 'bg-emerald-50 border-emerald-500' : 'bg-rose-50 border-rose-500'}`}>
                  <div className="flex items-start gap-4 mb-6">
                    <div className={`mt-1 p-2 rounded-xl border-2 text-white shadow-sm ${feedback.good ? 'bg-emerald-500 border-emerald-200' : 'bg-rose-500 border-rose-200'}`}>
                      {feedback.good ? <Icons.Check /> : <Icons.X />}
                    </div>
                    <div>
                      <h3 className={`text-3xl font-bold mb-2 ${feedback.good ? 'text-emerald-800' : 'text-rose-800'}`}>{feedback.title}</h3>
                      <p className="text-navy text-base leading-relaxed font-bold">{feedback.explanation}</p>
                    </div>
                  </div>

                  <div className="grid grid-cols-5 gap-3 mt-6 bg-white p-5 rounded-2xl border-2 border-navy/10 shadow-sm">
                    <div className="text-center">
                      <div className="text-[11px] text-navy/50 uppercase tracking-widest font-black mb-1">Cash</div>
                      <div className={`font-mono font-black text-xl ${feedback.effects.cash > 0 ? 'text-emerald-500' : feedback.effects.cash < 0 ? 'text-rose-500' : 'text-navy/40'}`}>
                        {feedback.effects.cash > 0 ? '+'+feedback.effects.cash : feedback.effects.cash}
                      </div>
                    </div>
                    <div className="text-center border-l-2 border-navy/10">
                      <div className="text-[11px] text-navy/50 uppercase tracking-widest font-black mb-1">Profit</div>
                      <div className={`font-mono font-black text-xl ${feedback.effects.profit > 0 ? 'text-emerald-500' : feedback.effects.profit < 0 ? 'text-rose-500' : 'text-navy/40'}`}>
                        {feedback.effects.profit > 0 ? '+'+feedback.effects.profit : feedback.effects.profit}
                      </div>
                    </div>
                    <div className="text-center border-l-2 border-navy/10">
                      <div className="text-[11px] text-navy/50 uppercase tracking-widest font-black mb-1">Rep</div>
                      <div className={`font-mono font-black text-xl ${feedback.effects.rep > 0 ? 'text-emerald-500' : feedback.effects.rep < 0 ? 'text-rose-500' : 'text-navy/40'}`}>
                        {feedback.effects.rep > 0 ? '+'+feedback.effects.rep : feedback.effects.rep}
                      </div>
                    </div>
                    <div className="text-center border-l-2 border-navy/10">
                      <div className="text-[11px] text-navy/50 uppercase tracking-widest font-black mb-1">Ops</div>
                      <div className={`font-mono font-black text-xl ${feedback.effects.ops > 0 ? 'text-emerald-500' : feedback.effects.ops < 0 ? 'text-rose-500' : 'text-navy/40'}`}>
                        {feedback.effects.ops > 0 ? '+'+feedback.effects.ops : feedback.effects.ops}
                      </div>
                    </div>
                    <div className="text-center border-l-2 border-navy/10 bg-amber-50 rounded-lg -m-2 p-2 ml-1 border border-amber-200">
                      <div className="text-[11px] text-amber-600 uppercase tracking-widest font-black mb-1">Bus Pts</div>
                      <div className="font-mono font-black text-xl text-amber-500">
                        {feedback.effects.bus > 0 ? '+'+feedback.effects.bus : feedback.effects.bus}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* NEXT BUTTON */}
              {answeredState && (
                <button onClick={nextLevel} className={`mt-4 w-full bg-navy text-white font-bold text-2xl py-6 rounded-2xl transition-all flex items-center justify-center gap-3 shrink-0 animate-slide-up hover:-translate-y-1 active:translate-y-1 uppercase tracking-widest border-b-4 border-[#000022] active:border-b-0 shadow-lg hover:shadow-xl`}>
                  {isReviewMode ? 'Return to Active Phase' : 'Proceed to Next Phase'}
                  <Icons.ArrowRight />
                </button>
              )}

            </div>
          </main>

          {/* SHOP MODAL */}
          {showShop && (
            <div className="fixed inset-0 bg-white/90 flex items-center justify-center p-4 z-50 backdrop-blur-md animate-fade-in">
              <div className="bg-white p-8 md:p-10 rounded-[2rem] max-w-3xl w-full border-4 border-navy shadow-2xl relative overflow-hidden">

                <button onClick={() => setShowShop(false)} className="absolute top-6 right-6 text-navy/50 hover:text-navy transition-colors bg-white p-2.5 rounded-full border-2 border-navy/20 hover:border-navy active:scale-90">
                  <Icons.X />
                </button>
                
                <h2 className="text-4xl font-bold text-navy mb-3 flex items-center gap-4">
                  <span className="text-navy bg-accent-hotpink p-3 rounded-2xl border-2 border-navy shadow-sm"><Icons.ShoppingCart /></span> 
                  Consulting Services
                </h2>
                <p className="text-navy/70 text-base mb-8 font-bold">Acquire strategic advantages using firm capital to survive the audit.</p>
                
                <div className="bg-navy/5 p-5 rounded-2xl border-2 border-navy/20 mb-8 inline-flex items-center gap-5 shadow-inner">
                  <span className="text-sm uppercase tracking-widest font-black text-navy/60">Available Capital</span>
                  <span className="text-4xl font-bold text-amber-500">{state.business} pts</span>
                </div>
                
                <div className="grid gap-5">
                  {shopItems.map(item => {
                    const canAfford = state.business >= item.cost;
                    return (
                    <div key={item.id} className="bg-white border-2 border-navy/20 p-5 rounded-2xl flex flex-col md:flex-row md:items-center justify-between group hover:border-navy transition-all hover:bg-navy/5 shadow-sm hover:shadow-md">
                      <div className="flex items-start gap-5 mb-4 md:mb-0">
                        <div className="mt-1 text-navy bg-white p-3 rounded-xl border-2 border-navy/20 shadow-sm">{item.icon}</div>
                        <div>
                          <div className="font-bold text-navy text-2xl mb-2 flex items-center gap-3 tracking-wide">
                            {item.name}
                            {state.inventory[item.id] > 0 ? <span className="text-[11px] bg-accent-hotpink text-navy px-3 py-1 rounded-lg font-sans uppercase tracking-widest font-black shadow-sm border-b-2 border-navy">Owned: {state.inventory[item.id]}</span> : null}
                          </div>
                          <div className="text-sm text-navy/70 font-bold">{item.desc}</div>
                        </div>
                      </div>
                      <div className="flex flex-row md:flex-col items-center md:items-end justify-between md:justify-center gap-3 shrink-0 md:ml-6 bg-navy/5 md:bg-transparent p-4 md:p-0 rounded-xl border-2 md:border-none border-navy/10">
                        <div className="text-base font-bold text-amber-600">Cost: {item.cost}</div>
                        <button 
                          onClick={() => {
                            if (canAfford) {
                              setState(prev => ({...prev, business: prev.business - item.cost, inventory: {...prev.inventory, [item.id]: prev.inventory[item.id] + 1}}));
                              addLog('Procurement', `Acquired ${item.name}.`);
                            }
                          }}
                          disabled={!canAfford} 
                          className={`text-sm font-black uppercase tracking-widest px-6 py-3 rounded-xl transition-all border-b-4 ${canAfford ? 'bg-amber-500 text-white border-amber-700 hover:bg-amber-400 hover:translate-y-[-2px] active:translate-y-[2px] active:border-b-0 shadow-sm' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}`}>
                          {canAfford ? 'Purchase' : 'Insufficient'}
                        </button>
                      </div>
                    </div>
                  )})}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
