          { text: "Increase Accounts Receivable $15,000 and Decrease PP&E $15,000.", correct: false, fb: "The city owes you nothing! You fabricated a receivable to hide an expense.", effects: { ar: 15000, ppe: -15000 } }
        ]
      },
      {
        id: 11, district: "Mail Room", title: "Vendor Standoff", concept: "Days Payable Outstanding (DPO)", 
        bgImage: "data/11.png",
        scene: "You owe a local farm $5,000 in Accounts Payable. They offer a 10% discount ($500) if you pay today. Otherwise, pay the full $5,000 in 30 days. You decide to pay today.",
        tip: "Accounting Standard: Paying early reduces your Days Payable Outstanding (DPO) but captures a high-yield discount, which is booked as Other Income.",
        explanation: "You clear the entire $5,000 liability, but only part with $4,500 in cash. The $500 difference is a massive financial gain. This action drops DPO but supercharges Net Income.",
        choices: [
          { text: "Decrease Cash $4,500, Decrease AP $5,000, and Record $500 Other Income.", correct: true, fb: "Financial mastery! You captured the deep discount and correctly balanced the books.", effects: { cash: -4500, ap: -5000, otherIncome: 500 } },
          { text: "Decrease Cash $5,000 and Decrease AP $5,000.", correct: false, fb: "Missed value! You overpaid the vendor and lost free money.", effects: { cash: -5000, ap: -5000 } },
          { text: "Decrease Cash $4,500 and Decrease AP $4,500.", correct: false, fb: "Imbalance! You left a ghost $500 payable on your books forever.", effects: { cash: -4500, ap: -4500 } }
        ]
      },
      {
        id: 12, district: "The Cellar", title: "Missing Merlot", concept: "Inventory Shrinkage", 
        bgImage: "data/12.png",
        scene: "Month-end count! The ledger says we have $10,000 in wine. We only counted $8,000. The bartenders look suspiciously happy.",
        tip: "Accounting Standard: When physical inventory is less than book inventory, the difference (shrinkage) must be expensed (typically to COGS) to reflect reality.",
        explanation: "You lost $2,000 of wine. It's not an asset anymore. It must hit the Income Statement, reducing your Gross Margin.",
        choices: [
          { text: "Decrease Inventory $2,000 and Increase COGS (Shrinkage) $2,000.", correct: true, fb: "Sobering reality. You adjusted the books to match the physical count.", effects: { inventory: -2000, cogs: 2000 } },
          { text: "Decrease Inventory $2,000 and Decrease Accounts Payable $2,000.", correct: false, fb: "Fraud! You can't just pretend you don't owe the vendor because the wine was stolen.", effects: { inventory: -2000, ap: -2000 } },
          { text: "Leave Inventory at $10,000. The wine is just 'misplaced'.", correct: false, fb: "Denial! You are deliberately overstating your assets.", effects: { } }
        ]
      }
    ];

    // --- SHUFFLE CHOICES ---
    // Randomize the order of choices for each level so the correct answer isn't always 'A'
    const shuffleArray = (array) => {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    };

    levels.forEach(level => {
        level.choices = shuffleArray(level.choices);
    });

    // --- MAIN REACT APP ---
    const App = () => {
      const [gameStarted, setGameStarted] = useState(false);
      const [teamData, setTeamData] = useState({ teamName: '', members: '' });
      
      // Establishing a realistic highly profitable YTD baseline so that Turnover, DII, DSO, and DPO calculate perfectly.
      // Net Income starts massively positive ($130,000) so flawless play keeps it there.
      // Total Assets: 100k + 30k + 20k + 180k - 50k = 280,000
      // Total Liab: 20k + 5k + 0 + 60k = 85,000
      // Total Equity: 65,000 + 130,000 (NI) = 195,000  (L+E = 280,000) -> Perfectly Balanced.
      const initialFs = {
        assets: { cash: 100000, ar: 30000, inventory: 20000, ppe: 180000, accumDepr: 50000 }, 
        liabilities: { ap: 20000, unearnedRev: 5000, interestPayable: 0, longTermDebt: 60000 }, 
        equity: { paidInCapital: 65000, retainedEarnings: 130000 }, 
        is: { revenue: 400000, cogs: 120000, opEx: 150000, otherIncome: 0, interestExpense: 0, taxExpense: 0 }
      };

      const [state, setState] = useState({
        currentIndex: 0,
        viewingIndex: 0,
        timeLeft: 90, 
        fs: initialFs,
        budget: 5000, 
        inventory: { memo: 0, insurance: 0 },
        active: { insurance: false, usedMemo: false },
        finished: false
      });

      const [levelData, setLevelData] = useState({});
      const [showShop, setShowShop] = useState(false);
      const [showFinancials, setShowFinancials] = useState(false);
      const [logs, setLogs] = useState([]);
      const [shake, setShake] = useState(false);
      
      // Emergency Loan Modal State
      const [emergencyInfo, setEmergencyInfo] = useState(null);
      
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitSuccess, setSubmitSuccess] = useState(false);
      
      // Audio State
      const [audioAllowed, setAudioAllowed] = useState(false);
      const audioCtxRef = useRef(null);
      
      const initAudio = () => {
        if (!audioCtxRef.current) {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if(Ctx) audioCtxRef.current = new Ctx();
        }
        if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
            audioCtxRef.current.resume();
        }
        setAudioAllowed(true);
      };

      const sfx = {
        playTone: (freq, type, duration, vol=0.05) => {
            if(!audioCtxRef.current || !audioAllowed) return;
            try {
              const osc = audioCtxRef.current.createOscillator();
              const gain = audioCtxRef.current.createGain();
              osc.type = type;
              osc.frequency.setValueAtTime(freq, audioCtxRef.current.currentTime);
              gain.gain.setValueAtTime(vol, audioCtxRef.current.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + duration);
              osc.connect(gain);
              gain.connect(audioCtxRef.current.destination);
              osc.start();
              osc.stop(audioCtxRef.current.currentTime + duration);
            } catch(e) {}
        },
        click: () => sfx.playTone(600, 'sine', 0.1, 0.02),
        success: () => {
            sfx.playTone(440, 'square', 0.1, 0.02);
            setTimeout(() => sfx.playTone(554, 'square', 0.1, 0.02), 100);
            setTimeout(() => sfx.playTone(659, 'square', 0.2, 0.02), 200);
        },
        error: () => {
            sfx.playTone(150, 'sawtooth', 0.3, 0.05);
            setTimeout(() => sfx.playTone(130, 'sawtooth', 0.4, 0.05), 150);
        },
        buy: () => {
            sfx.playTone(800, 'sine', 0.1, 0.03);
            setTimeout(() => sfx.playTone(1200, 'sine', 0.3, 0.03), 100);
        },
        siren: () => {
            for(let i=0; i<6; i++) {
                setTimeout(() => sfx.playTone(800, 'square', 0.2, 0.05), i*400);
                setTimeout(() => sfx.playTone(600, 'square', 0.2, 0.05), i*400 + 200);
            }
        }
      };

      const currentLevel = levels[state.viewingIndex];
      const isReviewMode = state.viewingIndex < state.currentIndex;
      const historyData = levelData[state.viewingIndex];
      const answeredState = isReviewMode || !!historyData;

      // Derived Metrics Calculation
      const calcMetrics = (fs) => {
        const gm = fs.is.revenue - fs.is.cogs;
        const gmPercent = fs.is.revenue === 0 ? 0 : ((gm / fs.is.revenue) * 100).toFixed(1);
        const netIncome = fs.is.revenue - fs.is.cogs - fs.is.opEx + fs.is.otherIncome - fs.is.interestExpense - fs.is.taxExpense;
        const totalAssets = fs.assets.cash + fs.assets.ar + fs.assets.inventory + fs.assets.ppe - fs.assets.accumDepr;
        const totalLiab = fs.liabilities.ap + fs.liabilities.unearnedRev + fs.liabilities.interestPayable + fs.liabilities.longTermDebt;
        const totalEq = fs.equity.paidInCapital + netIncome; 
        
        // Days & Turnover formulas assuming data acts as an annualized snapshot
        const turnover = fs.assets.inventory > 0 ? (fs.is.cogs / fs.assets.inventory).toFixed(2) : "N/A";
        const dii = fs.is.cogs > 0 ? ((fs.assets.inventory / fs.is.cogs) * 365).toFixed(0) : "N/A";
        const dso = fs.is.revenue > 0 ? ((fs.assets.ar / fs.is.revenue) * 365).toFixed(0) : "N/A";
        const dpo = fs.is.cogs > 0 ? ((fs.liabilities.ap / fs.is.cogs) * 365).toFixed(0) : "N/A";
        
        // Cash Conversion Cycle
        let ccc = "N/A";
        if (dii !== "N/A" && dso !== "N/A" && dpo !== "N/A") {
            ccc = (parseFloat(dii) + parseFloat(dso) - parseFloat(dpo)).toFixed(0);
        }

        return { gm, gmPercent, netIncome, totalAssets, totalLiab, totalEq, turnover, dii, dso, dpo, ccc };
      };

      const metrics = calcMetrics(state.fs);

      const triggerPenaltyShake = () => {
        setShake(true);
        setTimeout(() => setShake(false), 500);
      };

      const addLog = (title, text, isPenalty = false) => {
        setLogs(prev => [{ id: Date.now() + Math.random(), title, text, isPenalty, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }, ...prev].slice(0, 20));
      };

      const applyEffectsAndSetState = (effects, wasCorrect, prevState) => {
        let fs = {
          assets: { ...prevState.fs.assets },
          liabilities: { ...prevState.fs.liabilities },
          equity: { ...prevState.fs.equity },
          is: { ...prevState.fs.is }
        };

        let active = { ...prevState.active };
        let budgetDelta = wasCorrect ? 1500 : 0;
        let finalEffects = { ...effects };

        // Penalty Logic
        if (!wasCorrect && active.insurance) {
            addLog('Risk Hedge Triggered', 'Your expensive lawyers successfully argued with the SEC. No fine.', false);
            active.insurance = false;
        } else if (!wasCorrect && !active.insurance) {
            finalEffects.opEx = (finalEffects.opEx || 0) + 15000;
            finalEffects.cash = (finalEffects.cash || 0) - 15000;
            triggerPenaltyShake();
            addLog('SEC Audit Action', 'A SWAT team of accountants fast-ropes through the ceiling! $15,000 Fine!', true);
        }

        // BANKRUPTCY & EMERGENCY LOAN LOGIC
        let projectedCash = fs.assets.cash + (finalEffects.cash || 0);
        if (projectedCash < 0) {
            let shortfall = Math.abs(projectedCash);
            let loanAmount = shortfall + 5000; // Provide $5k breathing room
            let loanFee = 2500; // Realistic but painful interest charge

            finalEffects.cash = (finalEffects.cash || 0) + loanAmount;
            finalEffects.longTermDebt = (finalEffects.longTermDebt || 0) + loanAmount; 
            finalEffects.interestPayable = (finalEffects.interestPayable || 0) + loanFee; // Records liability properly to balance equation
            finalEffects.interestExpense = (finalEffects.interestExpense || 0) + loanFee;
            
            triggerPenaltyShake();
            sfx.siren();
            addLog('EMERGENCY LOAN', `Cash collapsed! Forced to accept a $${loanAmount} bridge loan at high interest.`, true);
            
            setEmergencyInfo({ amount: loanAmount, fee: loanFee });
        }

        // Apply Entries Safely
        if (finalEffects.cash !== undefined) fs.assets.cash += finalEffects.cash;
        if (finalEffects.ar !== undefined) fs.assets.ar += finalEffects.ar;
        if (finalEffects.inventory !== undefined) fs.assets.inventory += finalEffects.inventory;
        if (finalEffects.ppe !== undefined) fs.assets.ppe += finalEffects.ppe;
        if (finalEffects.accumDepr !== undefined) fs.assets.accumDepr += finalEffects.accumDepr;

        if (finalEffects.ap !== undefined) fs.liabilities.ap += finalEffects.ap;
        if (finalEffects.unearnedRev !== undefined) fs.liabilities.unearnedRev += finalEffects.unearnedRev;
        if (finalEffects.interestPayable !== undefined) fs.liabilities.interestPayable += finalEffects.interestPayable;
        if (finalEffects.longTermDebt !== undefined) fs.liabilities.longTermDebt += finalEffects.longTermDebt;
        if (finalEffects.paidInCapital !== undefined) fs.equity.paidInCapital += finalEffects.paidInCapital;

        if (finalEffects.revenue !== undefined) fs.is.revenue += finalEffects.revenue;
        if (finalEffects.cogs !== undefined) fs.is.cogs += finalEffects.cogs;
        if (finalEffects.opEx !== undefined) fs.is.opEx += finalEffects.opEx;
        if (finalEffects.otherIncome !== undefined) fs.is.otherIncome += finalEffects.otherIncome;
        if (finalEffects.interestExpense !== undefined) fs.is.interestExpense += finalEffects.interestExpense;

        const ni = fs.is.revenue - fs.is.cogs - fs.is.opEx + fs.is.otherIncome - fs.is.interestExpense - fs.is.taxExpense;
        fs.equity.retainedEarnings = ni;

        setState({
          ...prevState,
          fs, active,
          budget: prevState.budget + budgetDelta
        });

        return finalEffects;
      };

      const handleTimeout = (currentState) => {
        const effects = { cash: -10000, opEx: 10000 }; 
        sfx.error();
        applyEffectsAndSetState(effects, false, currentState);
        
        const timeoutFeedback = {
          good: false, title: 'Analysis Paralysis',
          explanation: 'The auditor got bored and fined you $10,000 for wasting their time.',
          effects
        };
        
        setLevelData(prev => ({ ...prev, [currentState.viewingIndex]: { choiceIdx: -1, correct: false, feedback: timeoutFeedback } }));
        addLog(`Phase ${levels[currentState.viewingIndex].id}: Timeout`, `Late penalty applied.`, true);
      };

      useEffect(() => {
        if (!gameStarted || state.finished || isReviewMode || historyData || emergencyInfo) return; // Pause timer if emergency modal is open
        if (state.timeLeft <= 0) { handleTimeout(state); return; }
        const timerId = setTimeout(() => setState(prev => ({ ...prev, timeLeft: Math.max(0, prev.timeLeft - 1) })), 1000);
        return () => clearTimeout(timerId);
      }, [gameStarted, state.finished, isReviewMode, historyData, state.timeLeft, state.viewingIndex, emergencyInfo]);

      const handleChoice = (choiceIdx) => {
        if (isReviewMode || historyData) return;
        const choice = currentLevel.choices[choiceIdx];
        
        if (choice.correct) sfx.success();
        else sfx.error();

        const finalEffects = applyEffectsAndSetState(choice.effects, choice.correct, state);

        const newFeedback = {
          good: choice.correct,
          title: choice.fb,
          explanation: currentLevel.explanation,
          effects: finalEffects
        };

        setLevelData(prev => ({ ...prev, [state.viewingIndex]: { choiceIdx, correct: choice.correct, feedback: newFeedback } }));
        addLog(`Recording Posted`, choice.correct ? 'Transaction properly recorded. Auditor nods approvingly.' : 'Incorrect recording! Sirens blare in the distance.');
      };

      const nextLevel = () => {
        sfx.click();
        if (state.viewingIndex < state.currentIndex) {
            setState(prev => ({ ...prev, viewingIndex: prev.viewingIndex + 1 }));
            return;
        }
        if (state.currentIndex + 1 >= levels.length) {
          setState(prev => ({ ...prev, finished: true }));
        } else {
          setState(prev => ({ ...prev, currentIndex: prev.currentIndex + 1, viewingIndex: prev.currentIndex + 1, timeLeft: 90, active: { ...prev.active, usedMemo: false } }));
        }
      };

      const submitToSheet = async () => {
        sfx.click();
        setIsSubmitting(true);
        const data = new URLSearchParams();
        data.append("teamName", teamData.teamName);
        data.append("role", teamData.members || "N/A"); 
        // Appending CCC directly in the score string to ensure it gets recorded.
        data.append("score", `NI: ${metrics.netIncome} | GM: ${metrics.gmPercent}% | CCC: ${metrics.ccc}`); 
        
        try {
          await fetch(GOOGLE_SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: data
          });
          setSubmitSuccess(true);
          sfx.success();
        } catch(e) {
          console.error(e);
          alert("Network error. Please try submitting again.");
        }
        setIsSubmitting(false);
      };

      const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0 }).format(val);

      const FinancialStatements = ({ fs, metrics }) => (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 text-sm font-sans">
          <div className="bg-white rounded-xl border border-slate-300 shadow-sm overflow-hidden">
            <div className="bg-navy text-white p-3 font-bold uppercase tracking-wider text-center">Income Statement</div>
            <table className="w-full financial-table">
              <tbody>
                <tr><td>Revenue</td><td>{formatCurrency(fs.is.revenue)}</td></tr>
                <tr><td>Cost of Goods Sold (COGS)</td><td className="text-rose-600">({formatCurrency(fs.is.cogs)})</td></tr>
                <tr className="font-bold border-t border-slate-200"><td className="italic">Gross Margin</td><td>{formatCurrency(metrics.gm)}</td></tr>
                <tr><td>Operating Expenses</td><td className="text-rose-600">({formatCurrency(fs.is.opEx)})</td></tr>
                <tr><td>Other Income (Loss)</td><td className={fs.is.otherIncome < 0 ? 'text-rose-600' : 'text-emerald-600'}>{formatCurrency(fs.is.otherIncome)}</td></tr>
                <tr><td>Interest Expense</td><td className="text-rose-600">({formatCurrency(fs.is.interestExpense)})</td></tr>
                <tr className="total-row text-lg"><td className="uppercase">Net Income</td><td className={metrics.netIncome < 0 ? 'text-rose-600' : 'text-emerald-600'}>{formatCurrency(metrics.netIncome)}</td></tr>
              </tbody>
            </table>
          </div>

          <div className="bg-white rounded-xl border border-slate-300 shadow-sm overflow-hidden">
            <div className="bg-navy text-white p-3 font-bold uppercase tracking-wider text-center">Balance Sheet</div>
            <table className="w-full financial-table">
              <tbody>
                <tr className="bg-slate-100 font-bold"><td colSpan="2">Assets</td></tr>
                <tr className="indent"><td>Cash</td><td className={fs.assets.cash < 0 ? 'text-rose-600 font-bold' : ''}>{formatCurrency(fs.assets.cash)}</td></tr>
                <tr className="indent"><td>Accounts Receivable</td><td>{formatCurrency(fs.assets.ar)}</td></tr>
                <tr className="indent"><td>Inventory</td><td>{formatCurrency(fs.assets.inventory)}</td></tr>
                <tr className="indent"><td>PP&E (Gross)</td><td>{formatCurrency(fs.assets.ppe)}</td></tr>
                <tr className="indent"><td>Less: Accum. Depreciation</td><td className="text-rose-600">({formatCurrency(fs.assets.accumDepr)})</td></tr>
                <tr className="font-bold border-t border-slate-200"><td>Total Assets</td><td>{formatCurrency(metrics.totalAssets)}</td></tr>
                
                <tr className="bg-slate-100 font-bold border-t-2 border-slate-300"><td colSpan="2">Liabilities</td></tr>
                <tr className="indent"><td>Accounts Payable</td><td>{formatCurrency(fs.liabilities.ap)}</td></tr>
                <tr className="indent"><td>Unearned Revenue</td><td>{formatCurrency(fs.liabilities.unearnedRev)}</td></tr>
                <tr className="indent"><td>Interest Payable</td><td>{formatCurrency(fs.liabilities.interestPayable)}</td></tr>
                <tr className="indent"><td>Long-Term Debt</td><td>{formatCurrency(fs.liabilities.longTermDebt)}</td></tr>
                <tr className="font-bold border-t border-slate-200"><td>Total Liabilities</td><td>{formatCurrency(metrics.totalLiab)}</td></tr>

                <tr className="bg-slate-100 font-bold border-t-2 border-slate-300"><td colSpan="2">Equity</td></tr>
                <tr className="indent"><td>Paid-In Capital</td><td>{formatCurrency(fs.equity.paidInCapital)}</td></tr>
                <tr className="indent"><td>Retained Earnings</td><td className={fs.equity.retainedEarnings < 0 ? 'text-rose-600' : ''}>{formatCurrency(fs.equity.retainedEarnings)}</td></tr>
                <tr className="font-bold border-t border-slate-200"><td>Total Equity</td><td>{formatCurrency(metrics.totalEq)}</td></tr>
                
                <tr className="total-row text-base"><td className="uppercase">Total Liab. & Equity</td><td>{formatCurrency(metrics.totalLiab + metrics.totalEq)}</td></tr>
              </tbody>
            </table>
            {metrics.totalAssets !== (metrics.totalLiab + metrics.totalEq) && (
                <div className="bg-rose-500 text-white p-2 text-center font-bold text-xs uppercase animate-pulse mt-2">Critical Error: Balance Sheet Does Not Balance</div>
            )}
          </div>
        </div>
      );

      // --- LANDING PAGE ---
      if (!gameStarted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden bg-slate-900">
            <div className="absolute inset-0 bg-gradient-to-br from-slate-900 via-navy to-indigo-950 z-0"></div>
            
            {/* Animated Background Elements */}
            <div className="absolute top-20 left-20 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl animate-pulse"></div>
            <div className="absolute bottom-20 right-20 w-96 h-96 bg-accent-hotpink/10 rounded-full blur-3xl animate-pulse" style={{animationDelay: '1s'}}></div>
            
            <div className="glass-panel max-w-3xl w-full p-10 md:p-12 rounded-3xl relative z-10 animate-fade-in shadow-2xl border border-white/20 bg-white/95">
              
              <div className="text-center mb-10">
                <div className="inline-flex items-center justify-center w-24 h-24 rounded-2xl bg-navy text-white mb-6 shadow-2xl border-4 border-accent-pink animate-float">
                  <Icons.PieChart />
                </div>
                <h1 className="text-5xl md:text-7xl font-black mb-4 tracking-tight leading-none text-gradient drop-shadow-sm">
                  Capital Carnage
                </h1>
                <p className="text-slate-500 text-xl font-bold uppercase tracking-widest">The Financial Accounting Audit</p>
              </div>
              
              {/* MISSION DIRECTIVES */}
              <div className="bg-slate-50 p-6 rounded-2xl border-2 border-slate-200 mb-10 shadow-inner">
                <h2 className="text-center text-sm font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center justify-center gap-2">
                  <Icons.Target /> Mission Directives
                </h2>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white p-4 rounded-xl border border-emerald-100 shadow-sm flex flex-col items-center text-center transform transition-transform hover:scale-105">
                    <div className="text-emerald-500 mb-2 bg-emerald-50 p-2 rounded-full"><Icons.ArrowUpCircle /></div>
                    <div className="font-black text-slate-800">Maximize Net Income</div>
                    <div className="text-xs text-slate-500 font-medium mt-1">Make GAAP-compliant choices to boost bottom-line profits.</div>
                  </div>
                  
                  <div className="bg-white p-4 rounded-xl border border-blue-100 shadow-sm flex flex-col items-center text-center transform transition-transform hover:scale-105">
                    <div className="text-blue-500 mb-2 bg-blue-50 p-2 rounded-full"><Icons.TrendingUp /></div>
                    <div className="font-black text-slate-800">Boost Gross Margin</div>
                    <div className="text-xs text-slate-500 font-medium mt-1">Strategically manage inventory costs and menu engineering.</div>
                  </div>
                  
                  <div className="bg-white p-4 rounded-xl border border-purple-100 shadow-sm flex flex-col items-center text-center transform transition-transform hover:scale-105">
                    <div className="text-purple-500 mb-2 bg-purple-50 p-2 rounded-full"><Icons.ArrowDownCircle /></div>
                    <div className="font-black text-slate-800">Minimize CCC</div>
                    <div className="text-xs text-slate-500 font-medium mt-1">Reduce Cash Conversion Cycle by collecting fast and delaying payables.</div>
                  </div>
                </div>
              </div>

              <div className="mb-8 space-y-4">
                <input type="text" className="w-full bg-white border-2 border-slate-300 focus:border-navy focus:ring-4 focus:ring-navy/10 rounded-2xl p-5 text-navy outline-none transition-all font-mono text-lg shadow-inner font-bold placeholder-slate-400"

                  <span className="text-3xl font-mono font-black text-emerald-600 bg-white px-4 py-1 rounded-xl shadow-sm border border-emerald-100">{formatCurrency(state.budget)}</span>
                </div>
                
                <div className="space-y-5">
                  <div className="border-2 border-slate-200 p-5 rounded-2xl flex justify-between items-center hover:border-navy transition-colors">
                    <div>
                        <div className="font-black text-xl text-navy mb-1">GAAP Memo</div>
                        <div className="text-sm text-slate-500 font-bold">Unlocks the accounting standard hint for a scenario.</div>
                        <div className="text-sm font-black mt-3 text-indigo-600 bg-indigo-50 inline-block px-3 py-1 rounded-lg">Cost: $1,500 | Owned: {state.inventory.memo}</div>
                    </div>
                    <button onClick={() => { if(state.budget >= 1500) { sfx.buy(); setState(p => ({...p, budget: p.budget - 1500, inventory: {...p.inventory, memo: p.inventory.memo + 1}})); } else { sfx.error(); } }} disabled={state.budget < 1500} className="bg-navy text-white px-6 py-3 rounded-xl text-sm font-black uppercase tracking-widest disabled:opacity-50 hover:bg-[#000033] border-b-4 border-[#000022] active:border-b-0 active:translate-y-1 transition-all">Purchase</button>
                  </div>
                  
                  <div className="border-2 border-slate-200 p-5 rounded-2xl flex justify-between items-center hover:border-navy transition-colors">
                    <div>
                        <div className="font-black text-xl text-navy mb-1">Risk Hedge</div>
                        <div className="text-sm text-slate-500 font-bold">Bypasses the $15,000 SEC fine on your next incorrect choice.</div>
                        <div className="text-sm font-black mt-3 text-indigo-600 bg-indigo-50 inline-block px-3 py-1 rounded-lg">Cost: $3,000 | Owned: {state.inventory.insurance}</div>
                    </div>
                    <button onClick={() => { if(state.budget >= 3000) { sfx.buy(); setState(p => ({...p, budget: p.budget - 3000, inventory: {...p.inventory, insurance: p.inventory.insurance + 1}})); } else { sfx.error(); } }} disabled={state.budget < 3000} className="bg-navy text-white px-6 py-3 rounded-xl text-sm font-black uppercase tracking-widest disabled:opacity-50 hover:bg-[#000033] border-b-4 border-[#000022] active:border-b-0 active:translate-y-1 transition-all">Purchase</button>
                  </div>

                  <div className="border-2 border-emerald-200 bg-emerald-50 p-5 rounded-2xl flex justify-between items-center">
                    <div>
                        <div className="font-black text-xl text-emerald-900 mb-1">Activate Risk Hedge</div>
                        <div className="text-sm text-emerald-700 font-bold">Consume 1 Risk Hedge to protect your next action.</div>
                    </div>
                    <button onClick={() => { if(state.inventory.insurance > 0 && !state.active.insurance) { sfx.click(); setState(p => ({...p, inventory: {...p.inventory, insurance: p.inventory.insurance - 1}, active: {...p.active, insurance: true}})); } else { sfx.error(); } }} disabled={state.inventory.insurance === 0 || state.active.insurance} className="bg-emerald-600 text-white px-6 py-3 rounded-xl text-sm font-black uppercase tracking-widest disabled:opacity-50 hover:bg-emerald-500 border-b-4 border-emerald-800 active:border-b-0 active:translate-y-1 transition-all shadow-md">Activate</button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
