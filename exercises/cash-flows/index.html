        ::-webkit-scrollbar { width: 12px; height: 12px; }

        ::-webkit-scrollbar-thumb { background: #3b82f6; border: 3px solid #0f172a; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
        
        body {
            background-color: #cbd5e1;
            background-image: 
                radial-gradient(#3b82f6 1.5px, transparent 1.5px),
                radial-gradient(#3b82f6 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* Animation Classes */
        @keyframes popIn { 
            0% { transform: scale(0.9); opacity: 0; } 
            50% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; } 
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }

        /* Game Card Base */

            background: white;
            border: 3px solid #0f172a;
            border-radius: 16px;
            box-shadow: 4px 4px 0px rgba(15, 23, 42, 1);

    </style>

              workingCapital: [{ label: "Accounts Receivable", val: ["(5)", "2", "5"] }, { label: "Inventories", val: ["(15)", "10", "4"] }, { label: "Accounts Payable", val: ["30", "(20)", "(50)"] }, { label: "Accrued Liabilities", val: ["40", "15", "30"] }, { label: "Other Operating Changes", val: ["(10)", "10", "44"] }],
              operatingCashFlow: ["210", "(15)", "(220)"],

        ];

        const SUSPECTS = ["NVIDIA", "Rivian", "Coca-Cola", "Peloton", "Beyond Inc. (Bed Bath & Beyond)"];

        // --- HELPERS ---
        const parseFinancialValue = (valStr) => {
          if (typeof valStr !== 'string') return 0;
          const isNegative = valStr.includes('(');
          const cleanStr = valStr.replace(/[^0-9.]/g, '');
          const num = parseFloat(cleanStr);
          return isNegative ? -num : num;
        };

        const generateHash = (data) => btoa(JSON.stringify(data));
        const verifyHash = (hash) => { try { return JSON.parse(atob(hash)); } catch (e) { return null; } };

        // --- COMPONENTS ---

        const GameButton = ({ onClick, children, variant = "primary", className = "", disabled = false }) => {
            const base = "font-black rounded-xl border-[3px] border-game-dark transition-all flex items-center justify-center gap-2 px-4 py-2";
            const activeHover = disabled ? "opacity-50 cursor-not-allowed bg-slate-300 text-slate-500" : "hover:-translate-y-1 hover:shadow-game-lg active:translate-x-1 active:translate-y-1 active:shadow-none shadow-game";
            
            const variants = {
                primary: "bg-game-blue text-white",
                secondary: "bg-white text-game-dark",
                danger: "bg-game-red text-white",
                success: "bg-game-green text-white",
                purple: "bg-game-purple text-white"
            };

            return <button onClick={onClick} disabled={disabled} className={`${base} ${disabled ? 'opacity-50 cursor-not-allowed bg-slate-300 text-slate-500' : variants[variant] + ' ' + activeHover} ${className}`}>{children}</button>;
        };

        const SmartInput = ({ id, value, correctValue, isPct, onChange, instructorMode }) => {
            const [localVal, setLocalVal] = useState(value || "");
            const [status, setStatus] = useState("neutral");

            useEffect(() => {
                setLocalVal(value || "");
                if (value) validate(value);
                else setStatus("neutral");
            }, [value]);

            const evaluateExpression = (expression) => {
                if (!expression) return "";
                let cleanExp = expression.toString().replace(/,/g, ''); 
                cleanExp = cleanExp.replace(/(\d+)%/g, '($1/100)');
                try {
                    if (!/^[\d+\-*/().\s]+$/.test(cleanExp)) return expression;
                    const result = Function('"use strict";return (' + cleanExp + ')')();
                    return result;
                } catch (e) { return expression; }
            };

            const validate = (valToTest) => {
                const calculated = evaluateExpression(valToTest);
                if (calculated === "" || isNaN(calculated)) {
                    setStatus("neutral");
                    return;
                }
                let numericVal = parseFloat(calculated);
                let target = parseFloat(correctValue);

                if (isPct && Math.abs(target) < 1 && Math.abs(numericVal) > 1) numericVal = numericVal / 100;
                
                const diff = Math.abs(numericVal - target);
                const tolerance = Math.abs(target * 0.02); 

                if (target === 0) setStatus(Math.abs(numericVal) < 0.01 ? "correct" : "incorrect");
                else setStatus(diff <= tolerance ? "correct" : "incorrect");
            };

            const handleBlur = () => {
                const finalVal = evaluateExpression(localVal);
                setLocalVal(finalVal);
                validate(finalVal);
                onChange(finalVal);
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter') e.target.blur(); };

            let borderClass = "border-2 border-game-dark bg-white focus:bg-yellow-50 focus:ring-0";
            if (status === "correct") borderClass = "border-2 border-game-dark bg-game-green text-white font-black shadow-game-sm";
            if (status === "incorrect") borderClass = "border-2 border-game-dark bg-game-red text-white font-black shadow-game-sm";

            return (
                <div className="relative w-full">
                    <input
                        type="text"
                        value={localVal}
                        onChange={(e) => setLocalVal(e.target.value)}
                        onBlur={handleBlur}
                        onKeyDown={handleKeyDown}
                        className={`w-full p-2 text-right font-mono text-sm rounded-lg outline-none transition-all ${borderClass}`}
                        placeholder={status === "neutral" ? "?" : ""}
                    />
                    {status === "correct" && <div className="absolute left-2 top-1/2 -translate-y-1/2 text-white pointer-events-none"><Check size={18} strokeWidth={4} /></div>}
                    {instructorMode && <div className="absolute top-full left-0 w-full text-[10px] text-white font-black bg-game-purple border-[2px] border-game-dark px-1 z-10 text-center rounded shadow-game-sm mt-1">Key: {correctValue}</div>}
                </div>
            );
        };

        const TrendChart = ({ data, years, title, onClose }) => {
            const chartData = years.map((y, i) => ({ year: y, val: parseFinancialValue(data[i]) })); 
            const values = chartData.map(d => d.val);
            const minVal = Math.min(...values, 0); 
            const maxVal = Math.max(...values, 0);
            const range = (maxVal - minVal) || 100;
            const height = 250;
            const width = 400;
            const padding = 40;
            const plotHeight = height - padding * 2;
            const plotWidth = width - padding * 2;
            const getY = (val) => padding + plotHeight - ((val - minVal) / range) * plotHeight;
            const getX = (index) => padding + (index / (chartData.length - 1)) * plotWidth;

            return (
                <div className="fixed inset-0 bg-game-dark/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-pop-in">
                    <div className="game-card p-6 w-full max-w-lg relative bg-white">
                        <button onClick={onClose} className="absolute -top-4 -right-4 bg-game-red text-white border-4 border-game-dark rounded-full p-2 shadow-game hover:scale-110 active:scale-95 transition-all"><X size={24} strokeWidth={3} /></button>
                        <h3 className="font-black text-game-dark text-xl mb-4 border-b-4 border-game-blue pb-2 inline-block pr-8">{title}</h3>
                        <div className="flex justify-center mt-4">
                            <svg width={width} height={height} className="overflow-visible bg-slate-50 rounded-xl border-2 border-game-dark">
                                {minVal < 0 && maxVal > 0 && <line x1={padding} y1={getY(0)} x2={width - padding} y2={getY(0)} stroke="#0f172a" strokeWidth="2" strokeDasharray="6 4" />}
                                <polyline fill="none" stroke="#3b82f6" strokeWidth="4" strokeLinejoin="round" points={chartData.map((d, i) => `${getX(i)},${getY(d.val)}`).join(' ')} />
                                {chartData.map((d, i) => (
                                <g key={d.year}>

                                )})}
                                <div className="flex justify-end pt-6">
                                    <GameButton onClick={downloadReport} className="py-4 px-8 text-xl shadow-game-lg"><Download size={24} strokeWidth={3} /> Generate Final Report</GameButton>
                                </div>
                            </div>
                         </div>
                    </div>
                );
            };

            const allPhase1Done = Object.keys(answers).length === CASES.length && !Object.values(answers).includes(undefined);
            const isPhase2 = gameState === 'analysis';

            return (
                <div className={`min-h-screen bg-slate-200 flex flex-col font-sans ${teacherMode ? 'pt-14' : ''}`}>
                    {teacherMode && <InstructorToolbar onAutoFill={handleAutoFill} onClear={() => setShowClearConfirm(true)} />}
                    {showClearConfirm && (
                        <Modal title="System Wipe" onClose={() => setShowClearConfirm(false)}>
                            <div className="space-y-6"><p className="font-bold text-slate-700">WARNING: This will purge all current session data. Irreversible action.</p><div className="flex gap-3 justify-end"><GameButton variant="secondary" onClick={() => setShowClearConfirm(false)}>Cancel</GameButton><GameButton variant="danger" onClick={confirmClear}>Wipe Data</GameButton></div></div>
                        </Modal>
                    )}
                    
                    {/* Main Nav/HUD */}
                    <div className="bg-game-dark text-white p-4 sticky top-0 z-30 border-b-4 border-game-blue shadow-[0_8px_0px_rgba(15,23,42,0.1)]">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-game-blue rounded-lg border-2 border-white flex items-center justify-center shadow-[2px_2px_0px_#fff]"><Folder size={20} strokeWidth={3} /></div>
                                <div>
                                    <div className="text-xs font-black text-game-blue tracking-widest uppercase">Active Agent</div>
                                    <div className="font-black text-xl truncate max-w-[200px]">{studentName}</div>
                                </div>
                            </div>
                            
                            <div className="flex bg-slate-800 p-1.5 rounded-xl border-2 border-slate-600 shadow-inner overflow-x-auto w-full sm:w-auto">
                                <button onClick={() => setGameState('playing')} className={`px-4 py-2 rounded-lg font-black text-sm uppercase tracking-wider transition-all whitespace-nowrap ${!isPhase2 ? 'bg-game-blue text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>1. Investigate</button>
                                <button onClick={() => { if(allPhase1Done) { setGameState('analysis'); triggerConfetti(); } }} disabled={!allPhase1Done} className={`px-4 py-2 rounded-lg font-black text-sm uppercase tracking-wider transition-all flex items-center gap-2 whitespace-nowrap ${isPhase2 ? 'bg-game-purple text-white shadow-md' : 'text-slate-400'} ${!allPhase1Done ? 'opacity-50 cursor-not-allowed' : 'hover:text-white'}`}>2. The Matrix {allPhase1Done && <CheckCircle size={16} className="text-game-green" />}</button>
                            </div>

                            <div className="flex items-center gap-6">
                                <div className={`font-mono text-2xl font-black bg-slate-800 px-4 py-2 rounded-xl border-2 shadow-inner flex items-center gap-3 ${timeLeft < 60 ? 'text-game-red border-game-red animate-pulse' : 'text-game-green border-slate-600'}`}><Clock size={24} strokeWidth={3} /> {formatTime(timeLeft)}</div>
                            </div>
                        </div>
                    </div>

                    {/* Content Area */}
                    <div className="flex-grow overflow-y-auto">
                        {isPhase2 ? <LifecycleView /> : (
                            <div className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 pt-8">
                                {!selectedCaseId ? (
                                    <div className="space-y-8 animate-fade-in">
                                        <div className="text-center space-y-2">
                                            <h2 className="text-3xl font-black text-game-dark uppercase tracking-widest">Dossier Selection</h2>
                                            <p className="font-bold text-slate-500">Select a file to begin forensic analysis.</p>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                                            {CASES.map((c) => {
                                                const isIdentified = !!answers[c.id];
                                                return (
                                                <button key={c.id} onClick={() => setSelectedCaseId(c.id)} className={`game-card group relative p-6 transition-all duration-200 text-left flex flex-col items-center text-center gap-4 hover:-translate-y-2 hover:shadow-game-lg ${isIdentified ? 'bg-emerald-50 border-game-green' : 'bg-white border-game-dark'}`}>
                                                    <div className={`w-20 h-20 border-4 rounded-2xl flex items-center justify-center text-3xl font-black shadow-game-sm transform transition-transform group-hover:scale-110 ${isIdentified ? 'bg-game-green border-game-dark text-white' : 'bg-game-light border-game-dark text-game-dark'}`}>{c.id}</div>
                                                    <div className="w-full">
                                                        <h3 className="font-black text-game-dark text-lg border-b-2 border-slate-200 pb-2 w-full">FILE {c.id}</h3>
                                                        <p className={`text-sm font-bold mt-2 truncate w-full px-2 py-1 rounded ${isIdentified ? 'bg-emerald-200 text-emerald-900' : 'bg-slate-200 text-slate-500'}`}>{answers[c.id] || "UNIDENTIFIED"}</p>
                                                    </div>
                                                    {isIdentified && <div className="absolute -top-3 -right-3 bg-white rounded-full"><CheckCircle size={32} className="text-game-green" strokeWidth={3}/></div>}
                                                </button>
                                            )})}
                                        </div>
                                        
                                        {allPhase1Done && (
                                            <div className="mt-12 bg-game-blue text-white p-8 rounded-2xl shadow-game border-4 border-game-dark flex flex-col sm:flex-row items-center justify-between gap-6 animate-pop-in">
                                                <div className="text-center sm:text-left">
                                                    <h3 className="font-black text-2xl tracking-wide uppercase">Phase 1 Complete</h3>
                                                    <p className="font-bold text-blue-200 mt-1">All dossiers successfully identified.</p>
                                                </div>
                                                <GameButton onClick={() => { setGameState('analysis'); triggerConfetti(); }} variant="secondary" className="py-4 px-8 text-xl shadow-game-lg">Enter Phase 2 <ChevronRight size={24} strokeWidth={4}/></GameButton>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="space-y-6 animate-fade-in">
                                        <button onClick={() => setSelectedCaseId(null)} className="flex items-center gap-2 text-game-dark hover:text-game-blue font-black transition-colors bg-white px-4 py-2 border-2 border-game-dark shadow-game-sm rounded-lg hover:-translate-y-1 active:translate-y-0 active:shadow-none"><ChevronLeft size={20} strokeWidth={3}/> RETURN TO DESK</button>
                                        <div className="grid lg:grid-cols-3 gap-8">
                                            <div className="lg:col-span-2">
                                                <CashFlowDoc data={CASES.find(c => c.id === selectedCaseId)} onChartRequest={(t,d,y) => setActiveChart({title:t, data:d, years:y})} inputState={sheetInputs} onInputChange={handleSheetInput} instructorMode={teacherMode} />
                                            </div>
                                            <div className="space-y-6">
                                                <div className="game-card p-6 sticky top-28 bg-white border-4 border-game-dark shadow-game-lg">
                                                    <h3 className="font-black text-xl text-game-dark mb-6 flex items-center gap-3 border-b-4 border-game-blue pb-3"><Search size={24} strokeWidth={3}/> IDENTIFY SUBJECT</h3>
                                                    <div className="space-y-3">
                                                        {SUSPECTS.map(company => (
                                                            <button key={company} onClick={() => setAnswers({...answers, [selectedCaseId]: company})} className={`w-full text-left p-4 rounded-xl border-[3px] font-black transition-all ${answers[selectedCaseId] === company ? 'bg-game-blue text-white border-game-dark shadow-[4px_4px_0px_#0f172a] transform scale-[1.02]' : 'bg-game-light border-slate-300 hover:border-game-dark hover:shadow-[4px_4px_0px_#0f172a] hover:-translate-y-1 text-slate-600'}`}>{company}</button>
                                                        ))}
                                                    </div>
                                                    <div className="mt-8 pt-6 border-t-[3px] border-dashed border-slate-200">
                                                        {!hintsRevealed[selectedCaseId] ? (
                                                            <button onClick={() => setHintsRevealed({...hintsRevealed, [selectedCaseId]: true})} className="w-full py-4 text-sm font-black text-game-yellow bg-yellow-50 hover:bg-yellow-100 rounded-xl border-[3px] border-dashed border-game-yellow flex items-center justify-center gap-2 hover:-translate-y-1 transition-transform"><HelpCircle size={20} strokeWidth={3}/> DEPLOY INTEL HINT</button>
                                                        ) : (
                                                            <div className="bg-yellow-100 p-4 rounded-xl border-[3px] border-game-yellow text-sm text-yellow-900 font-bold shadow-inner">
                                                                <span className="font-black flex items-center gap-2 mb-2"><Key size={16}/> DECRYPTED HINT:</span>
                                                                {CASES.find(c => c.id === selectedCaseId).hint}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    
                    {activeChart && <TrendChart title={activeChart.title} data={activeChart.data} years={activeChart.years} onClose={() => setActiveChart(null)} />}
                    
                    {/* Footer */}
                    <div className="bg-game-dark border-t-4 border-slate-700 p-3 flex justify-between items-center text-white z-20">
                        <div className="text-xs font-mono font-bold text-slate-400 tracking-widest flex items-center gap-2"><Lock size={12}/> CONFIDENTIAL // LEVEL 5 ACCESS ONLY</div>
                        {!teacherMode && (<button onClick={() => setShowTeacherAuth(true)} className="flex items-center gap-2 text-xs font-black text-slate-400 hover:text-yellow-400 transition-colors px-3 py-1.5 rounded-lg border border-transparent hover:border-slate-600 uppercase tracking-widest"><Key size={14} strokeWidth={3}/> Gamemaster</button>)}
                    </div>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
